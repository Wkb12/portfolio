<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
<div class="container">
    <div class="nav-bar">
        <div class="nav-logo"><span class="logo-bg">WK</span></div>
        <a href="home.html" class="nav-link"><i class="fas fa-home"></i> About Me</a>
        <a href="skill.html" class="nav-link"><i class="fas fa-cogs"></i> My Skills</a>
        <a href="project.html" class="nav-link"><i class="fas fa-code-branch"></i> My Projects</a>
        <a href="contact.html" class="nav-link"><i class="fas fa-address-card"></i> Contact</a>
    </div>

    <div id="contact">
        <h2 class="section-title"><i class="fas fa-address-card"></i> Connect with me</h2>
        <div class="contact-section">
            <div class="contact-flex">
                <div class="contact-details">
                    <p><i class="fas fa-envelope" style="width: 28px;"></i> <strong>Email:</strong> wkull@gmail.com</p>
                    <p><i class="fas fa-phone-alt"></i> <strong>Phone / WhatsApp:</strong> +251 994143663</p>
                    <p><i class="fab fa-telegram"></i> <strong>Telegram:</strong> @httio7</p>
                </div>
                <div class="social-buttons">
                    <a href="https://t.me/httio7" target="_blank" class="social-btn"><i class="fab fa-telegram"></i> Telegram</a>
                    <a href="https://wa.me/251988452167" target="_blank" class="social-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                </div>
            </div>

            <div class="contact-form-wrapper">
                <h3>Send me a Message</h3>
                <form class="contact-form" action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required placeholder="Your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required placeholder="you@example.com">
                    </div>

                    <!-- Subject removed as requested -->

                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="6" required placeholder="Write your message here..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        © 2025 Wondwosen Kebede — 2nd year IT @ WSU | beginner web developer 🌱
    </footer>
</div>
</body>
</html>
